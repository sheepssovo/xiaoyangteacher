<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>小羊老师 V6</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>🐑 小羊老师 V6</h1>

<div class="card">
  <h2>📖 今日单词</h2>
  <div id="wordBox"></div>
  <button onclick="nextWord()">换一个</button>
  <button onclick="saveWord()">收藏</button>
</div>

<div class="card">
  <h2>📚 生词本</h2>
  <div id="book"></div>
</div>

<div class="card">
  <h2>🐑 小羊警告</h2>
  <div id="warning"></div>
</div>

<div class="card">
  <h2>📅 连续签到</h2>
  <div id="checkin"></div>
  <button onclick="checkIn()">签到</button>
</div>

<div class="card">
  <h2>📊 学习统计</h2>
  <div id="stats"></div>
</div>

<script src="words_real_50.js"></script>
<script src="app.js"></script>
</body>
</html>
