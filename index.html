<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>小羊老师 V6</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>🐑 小羊老师 V6</h1>
  <p>每天监督飞鸟学英语</p>

  <div class="card" id="today-word">
    <h2>📖 今日单词</h2>
    <div id="wordBox"></div>
    <button id="changeWord">换一个</button>
    <button id="collectWord">收藏</button>
  </div>

  <div class="card" id="word-book">
    <h2>📚 生词本</h2>
    <div id="book"></div>
  </div>

  <div class="card" id="warnings">
    <h2>🐑 小羊警告</h2>
    <div id="warning"></div>
  </div>

  <div class="card" id="check-in">
    <h2>📅 连续签到</h2>
    <button id="checkinBtn">签到</button>
    <div id="checkin"></div>
  </div>

  <div class="card" id="statistics">
    <h2>📊 学习统计</h2>
    <div id="stats"></div>
  </div>

  <script src="words_real_50.js"></script>
  <script src="app.js"></script>
</body>
</html>
