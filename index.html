<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小羊老师 V6</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🐑 小羊老师 V6</h1>
    <p>每天监督飞鸟学英语</p>

    <!-- 今日单词 -->
    <div class="card">
      <h2>📖 今日单词</h2>
      <div id="wordBox">
        <!-- JS 渲染单词 -->
      </div>
      <button id="changeWord">换一个</button>
      <button id="collectWord">收藏</button>
    </div>

    <!-- 生词本 -->
    <div class="card">
      <h2>📚 生词本</h2>
      <div id="book">
        <!-- JS 渲染收藏的单词 -->
      </div>
    </div>

    <!-- 小羊警告 -->
    <div class="card">
      <h2>🐑 小羊警告</h2>
      <div id="warning">
        <!-- JS 渲染警告 -->
      </div>
    </div>

    <!-- 连续签到 -->
    <div class="card">
      <h2>📅 连续签到</h2>
      <button id="checkinBtn">签到</button>
      <div id="checkin">已签到 0 天</div>
    </div>

    <!-- 学习统计 -->
    <div class="card">
      <h2>📊 学习统计</h2>
      <div id="stats">
        总单词量: 0<br>
        已收藏: 0
      </div>
    </div>
  </div>

  <script src="words_real_50.js"></script>
  <script src="app.js"></script>
</body>
</html>
